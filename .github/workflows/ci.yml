# -----------------------------------------------------------------
# CI/CD Pipeline -- Genere automatiquement par Code Auditor
#
# Phase 1 - 2 jobs :
#   1. build-test  -> maven (java)
#   2. sonar-scan  -> Qualite + Coverage + Quality Gate BLOQUANT
#
# Secrets requis dans GitHub Settings > Secrets > Actions :
#   - SONAR_TOKEN    : Token SonarCloud (sonarcloud.io)
#   - SONAR_HOST_URL : https://sonarcloud.io
# -----------------------------------------------------------------

name: "CI -- Build + SonarCloud"

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, develop]

permissions:
  contents: read
  statuses: write
  pull-requests: read

jobs:

  # -- Job 1 : Build & Test ------------------------------------------------
  build-test:
    name: "Build & Test (java/maven)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Setup Java 17"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: "Compile"
        run: mvn compile -q

      - name: "Tests + JaCoCo Coverage"
        run: mvn test -Dmaven.test.failure.ignore=true
        continue-on-error: true

      - name: "Generate JaCoCo XML report"
        run: mvn jacoco:report -q || echo "JaCoCo non configure -- ajoutez jacoco-maven-plugin dans pom.xml"
        continue-on-error: true

      - name: "Package"
        run: mvn package -q -DskipTests

      - name: "Upload coverage artifacts"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            target/site/jacoco/
            target/surefire-reports/
          retention-days: 5

  # -- Job 2 : SonarCloud Analysis -----------------------------------------
  sonar-scan:
    name: "SonarCloud Analysis"
    needs: build-test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: always() && needs.build-test.result == 'success'
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Setup Java 17"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: "Download coverage artifacts"
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: target/site/jacoco/
        continue-on-error: true

      - name: "Compile (requis par SonarCloud pour analyser le bytecode)"
        run: mvn -B compile -q

      - name: "SonarCloud Scan (Maven)"
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "https://sonarcloud.io"
        run: >
          mvn -B sonar:sonar -DskipTests
          -Dsonar.projectKey=${{ github.repository_owner }}_${{ github.event.repository.name }}
          -Dsonar.organization=${{ github.repository_owner }}
          -Dsonar.java.binaries=target/classes
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

      - name: "SonarCloud Quality Gate"
        uses: sonarsource/sonarqube-quality-gate-action@v1.1.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "https://sonarcloud.io"

      - name: "Dashboard URL"
        if: always()
        run: |
          echo "============================================"
          echo " SonarCloud Analysis Complete"
          echo " URL : https://sonarcloud.io/dashboard?id=${{ github.repository_owner }}_${{ github.event.repository.name }}"
          echo "============================================"
