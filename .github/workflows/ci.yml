# ─────────────────────────────────────────────────────────────────
# CI/CD Pipeline — Généré automatiquement par Code Auditor
#
# 5 jobs :
#   1. build-test   → maven (java)
#   2. sonar-scan   → Qualité + Coverage + Quality Gate BLOQUANT
#   3. dep-scan     → Dépendances CVE (pip-audit/npm audit/OWASP)
#   4. codeql-scan  → Sécurité statique (GitHub natif, gratuit)
#   5. docker-trivy → Build + Scan sécurité containers (si Dockerfile)
#
# Secrets requis :
#   - SONAR_TOKEN    : Token SonarQube/SonarCloud
#   - SONAR_HOST_URL : https://sonarcloud.io
#   GITHUB_TOKEN et CodeQL ne requièrent aucun secret.
# ─────────────────────────────────────────────────────────────────

name: "CI/CD — Build + SonarQube + Dep-Scan + CodeQL"

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, develop]

permissions:
  contents: read
  statuses: write
  pull-requests: read
  security-events: write   # Requis pour CodeQL et Trivy SARIF upload
  actions: read            # Requis pour CodeQL

jobs:
  # ── Job 1 : Build & Test ──────────────────────────────────────
  build-test:
    name: "Build & Test (java/maven)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Requis pour SonarQube blame

      - name: "⚙️ Setup Java"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: "🔨 Build"
        run: mvn compile -q

      - name: "🧪 Tests"
        # -Dmaven.test.failure.ignore=true : les échecs de tests ne bloquent pas
        # le pipeline — SonarQube analysera quand même le code et la couverture
        run: mvn test -Dmaven.test.failure.ignore=true
        continue-on-error: true

      - name: "📊 Coverage Report (JaCoCo)"
        # JaCoCo génère target/site/jacoco/jacoco.xml — utilisé par SonarQube
        # Si JaCoCo n'est pas dans le pom.xml, ce step est ignoré silencieusement
        run: mvn jacoco:report -q || echo "[INFO] JaCoCo non configuré — ajoutez jacoco-maven-plugin dans pom.xml pour la couverture"
        continue-on-error: true

      - name: "📦 Package"
        run: mvn package -q -DskipTests

      - name: "Upload Test Results"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            target/surefire-reports/
            target/site/jacoco/
          retention-days: 5

  # ── Job 2 : SonarQube Analysis ────────────────────────────────
  sonar-scan:
    name: "SonarQube Analysis"
    needs: build-test  # Attend les résultats de coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: always() && needs.build-test.result == 'success'
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Requis pour git blame et l'historique SonarQube

      - name: "⚙️ Setup Java 17"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: "📦 Download Coverage Artifacts"
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: .
        continue-on-error: true

      - name: "🔍 SonarQube Scan (Maven)"
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          mvn -B sonar:sonar -DskipTests \
            -Dsonar.projectKey=${{ github.repository_owner }}_${{ github.event.repository.name }} \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
        continue-on-error: true

      - name: "✅ SonarQube Quality Gate"
        # BLOQUANT — le pipeline échoue si le Quality Gate est FAILED
        # Nécessite que le Quality Gate soit configuré dans SonarCloud
        uses: sonarsource/sonarqube-quality-gate-action@v1.1.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        # Pas de continue-on-error → bloque le pipeline si gate FAILED

      - name: "📊 SonarQube Dashboard URL"
        if: always()
        run: |
          echo "══════════════════════════════════════════"
          echo " SonarQube Analysis Complete"
          echo " Projet  : ${{ github.repository_owner }}_${{ github.event.repository.name }}"
          echo " URL     : ${{ secrets.SONAR_HOST_URL }}/dashboard?id=${{ github.repository_owner }}_${{ github.event.repository.name }}"
          echo "══════════════════════════════════════════"


  # ── Job 3 : CodeQL Security Analysis ──────────────────────────
  # CodeQL est GRATUIT et NATIF GitHub Actions — zéro serveur requis.
  # Il analyse le code source pour détecter les vulnérabilités de sécurité
  # (SQL injection, XSS, path traversal...) et publie les résultats dans
  # Security > Code scanning du repo GitHub.
  codeql-scan:
    name: "CodeQL Security Analysis (java)"
    runs-on: ubuntu-latest
    # Tourne en parallèle avec sonar-scan pour optimiser le temps total
    needs: build-test
    if: always() && needs.build-test.result == 'success'
    timeout-minutes: 30  # CodeQL peut être lent sur les grands projets
    permissions:
      security-events: write  # Upload des résultats SARIF
      actions: read
      contents: read
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Initialize CodeQL"
        # Init : configure les langages à analyser + les requêtes de sécurité
        uses: github/codeql-action/init@v3
        with:
          languages: java
          # security-extended : requêtes de sécurité complètes (recommandé)
          # security-and-quality : ajoute aussi les règles de qualité
          queries: security-extended

      - name: "Autobuild"
        # Autobuild compile automatiquement le projet pour l'analyse
        # (nécessaire pour Java — pas pour Python/JS qui sont interprétés)
        uses: github/codeql-action/autobuild@v3

      - name: "Perform CodeQL Analysis"
        # Lance l'analyse et uploade les résultats dans GitHub Security
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java"



  # -- Job 4 : Dependency CVE Scan --
  dep-scan:
    name: "Dependency CVE Scan"
    runs-on: ubuntu-latest
    needs: build-test
    if: always() && needs.build-test.result == 'success'
    timeout-minutes: 15
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Setup Java"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: "OWASP Dependency-Check"
        run: mvn org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=9
        continue-on-error: true

      - name: "Upload OWASP results"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dep-scan-results
          path: target/dependency-check-report.html
          retention-days: 10


  # -- Job 5 : Docker Build + Trivy Scan --
  # Le job tourne si build-test=success.
  # Les steps Docker sont conditionnes par la presence d'un Dockerfile (detection bash).
  docker-trivy:
    name: "Docker Build + Trivy Security Scan"
    runs-on: ubuntu-latest
    needs: build-test
    if: needs.build-test.result == 'success'
    timeout-minutes: 20
    permissions:
      security-events: write
      packages: write
      contents: read
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Check Dockerfile exists"
        id: check_dockerfile
        run: |
          if [ -f "Dockerfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Dockerfile detected"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No Dockerfile found - Docker steps will be skipped"
          fi

      - name: "Set up Docker Buildx"
        if: steps.check_dockerfile.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v3

      - name: "Login to GHCR"
        if: >-
          steps.check_dockerfile.outputs.exists == 'true' &&
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Build Docker Image"
        if: steps.check_dockerfile.outputs.exists == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ github.repository }}:scan-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: "Trivy - Container Security Scan"
        if: steps.check_dockerfile.outputs.exists == 'true'
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: '${{ github.repository }}:scan-${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      - name: "Upload Trivy SARIF"
        if: steps.check_dockerfile.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: "Push to GHCR (main only)"
        if: >-
          steps.check_dockerfile.outputs.exists == 'true' &&
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
