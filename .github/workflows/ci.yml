# -----------------------------------------------------------------
# CI/CD Pipeline -- Genere automatiquement par Code Auditor
#
# Phase 1 - 5 jobs :
#   1. build-test    -> maven (java)
#   2. sonar-scan    -> Qualite + Coverage + Quality Gate BLOQUANT
#   3. dep-scan      -> Vulnerabilites CVE dans les dependances
#   4. codeql-scan   -> Securite statique profonde (GitHub natif)
#   5. docker-trivy  -> Scan securite image Docker
#
# Secrets requis :
#   - SONAR_TOKEN    : Token SonarCloud (sonarcloud.io)
# -----------------------------------------------------------------

name: "CI -- Build + SonarCloud + Dep-Scan + CodeQL + Trivy"

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, develop]

permissions:
  contents: read
  statuses: write
  pull-requests: read
  security-events: write   # Requis pour CodeQL SARIF upload
  actions: read            # Requis pour CodeQL

jobs:

  # -- Job 1 : Build & Test ------------------------------------------------
  build-test:
    name: "Build & Test (java/maven)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Setup Java 17"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: "Compile"
        run: mvn compile -q

      - name: "Tests + JaCoCo Coverage"
        run: mvn test -Dmaven.test.failure.ignore=true
        continue-on-error: true

      - name: "Generate JaCoCo XML report"
        run: mvn jacoco:report -q || echo "JaCoCo non configure -- ajoutez jacoco-maven-plugin dans pom.xml"
        continue-on-error: true

      - name: "Package"
        run: mvn package -q -DskipTests

      - name: "Upload coverage artifacts"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            target/site/jacoco/
            target/surefire-reports/
          retention-days: 5

  # -- Job 2 : SonarCloud Analysis -----------------------------------------
  sonar-scan:
    name: "SonarCloud Analysis"
    needs: build-test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: always() && needs.build-test.result == 'success'
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Setup Java 17"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: "Download coverage artifacts"
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: target/site/jacoco/
        continue-on-error: true

      - name: "Compile (requis par SonarCloud pour analyser le bytecode)"
        run: mvn -B compile -q

      - name: "SonarCloud Scan (Maven)"
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "https://sonarcloud.io"
        run: >
          mvn -B sonar:sonar -DskipTests
          -Dsonar.projectKey=${{ github.repository_owner }}_${{ github.event.repository.name }}
          -Dsonar.organization=${{ github.repository_owner }}
          -Dsonar.java.binaries=target/classes
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

      - name: "SonarCloud Quality Gate"
        uses: sonarsource/sonarqube-quality-gate-action@v1.1.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "https://sonarcloud.io"
        with:
          scanMetadataReportFile: target/sonar/report-task.txt

      - name: "Dashboard URL"
        if: always()
        run: |
          echo "============================================"
          echo " SonarCloud Analysis Complete"
          echo " URL : https://sonarcloud.io/dashboard?id=${{ github.repository_owner }}_${{ github.event.repository.name }}"
          echo "============================================"


  # -- Job 3 : Dependency Scan (OWASP) --------------------------------------
  dep-scan:
    name: "Dependency Scan (OWASP)"
    needs: build-test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: always() && needs.build-test.result == 'success'
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Setup Java 17"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: "OWASP Dependency-Check"
        run: >
          mvn -B org.owasp:dependency-check-maven:check
          -DfailBuildOnCVSS=9
          -Dformat=HTML
          -Dformat=JSON
          -DoutputDirectory=target/dependency-check
        continue-on-error: true

      - name: "Verifier rapport genere"
        run: |
          if [ -f target/dependency-check/dependency-check-report.html ]; then
            echo "Rapport OWASP genere avec succes"
            wc -l target/dependency-check/dependency-check-report.html
          else
            echo "Rapport non trouve — liste des fichiers target/:"
            find target/ -name "dependency-check*" 2>/dev/null || echo "Aucun fichier dependency-check"
          fi

      - name: "Upload OWASP Report"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-dependency-report
          path: target/dependency-check/
          retention-days: 10



  # -- Job 4 : CodeQL Security Analysis ---------------------------------
  codeql-scan:
    name: "CodeQL Security Analysis (java)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Initialize CodeQL"
        uses: github/codeql-action/init@v3
        with:
          languages: java
          queries: security-extended

      - name: "Build (CodeQL)"
        run: mvn -B compile -DskipTests -q

      - name: "Analyze"
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java"



  # -- Job 5 : Docker Security Scan (Trivy) --------------------------------
  docker-trivy:
    name: "Container Scan (Trivy)"
    needs: build-test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: always() && needs.build-test.result == 'success'
    permissions:
      security-events: write
      contents: read
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Check Dockerfile exists"
        id: check_docker
        run: |
          if [ -f "Dockerfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Dockerfile absent — skip Trivy scan"
          fi

      - name: "Build Docker image"
        if: steps.check_docker.outputs.exists == 'true'
        run: docker build -t app:${{ github.sha }} .

      - name: "Trivy — scan vulnerabilites"
        if: steps.check_docker.outputs.exists == 'true'
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: app:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0

      - name: "Upload SARIF to GitHub Security"
        if: steps.check_docker.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container

      - name: "Trivy — rapport HTML"
        if: steps.check_docker.outputs.exists == 'true'
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: app:${{ github.sha }}
          format: template
          template: "@/contrib/html.tpl"
          output: trivy-report.html
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0

      - name: "Upload Trivy rapport"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-security-report
          path: |
            trivy-results.sarif
            trivy-report.html
          retention-days: 10
