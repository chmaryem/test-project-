# ─────────────────────────────────────────────────────────────────
# CI/CD Pipeline — Généré automatiquement par Code Auditor AI
#
# 2 jobs :
#   1. build-test  → maven (java)
#   2. code-review → Code Auditor (RAG + KG + LLM)
#
# Pour configurer les secrets :
#   Settings → Secrets → Actions → New repository secret
#   - OPENROUTER_API_KEY  (clé OpenRouter)
#   - GOOGLE_API_KEY      (clé Gemini)
# ─────────────────────────────────────────────────────────────────

name: "CI/CD — Build + Code Auditor"

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  statuses: write
  pull-requests: write
  contents: read

jobs:
  # ── Job 1 : Build & Test ──────────────────────────────────────
  build-test:
    name: "Build & Test (java/maven)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Setup Java"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: "Build"
        run: mvn compile -q

      - name: "Tests"
        # -Dmaven.test.failure.ignore=true : les echecs de tests ne bloquent pas
        # le pipeline. Code Auditor (job code-review) est le vrai gate qualite.
        run: mvn test -q -Dmaven.test.failure.ignore=true
        continue-on-error: true

  # ── Job 2 : Code Auditor IA Review ────────────────────────────
  code-review:
    name: "Code Auditor Review"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request'
    steps:
      - name: "Checkout Projet"
        uses: actions/checkout@v4

      - name: "Checkout Code Auditor"
        uses: actions/checkout@v4
        with:
          repository: chmaryem/code_auditor
          path: code_auditor_tool

      - name: "Setup Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Node.js requis par le MCP GitHub server (npx @modelcontextprotocol/server-github)
      - name: "Setup Node.js 20"
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: "Cache pip (requirements-ci)"
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-auditor-${{ hashFiles('code_auditor_tool/requirements-ci.txt') }}
          restore-keys: |
            pip-auditor-

      # Utilise requirements-ci.txt (versions compatibles Python 3.11)
      # et NON requirements.txt qui contient des versions trop anciennes
      - name: "Install Code Auditor"
        run: |
          cd code_auditor_tool
          pip install --upgrade pip setuptools wheel
          if [ -f requirements-ci.txt ]; then
            pip install -r requirements-ci.txt
          else
            echo "WARN: requirements-ci.txt absent, fallback sur requirements.txt"
            pip install -r requirements.txt || true
          fi

      # Pre-install du MCP GitHub server pour eviter cold-start lent
      - name: "Pre-install MCP GitHub server"
        run: npx --yes @modelcontextprotocol/server-github --version || true

      - name: "Analyse PR"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          cd code_auditor_tool
          python -m ci_cd.ci_runner \
            --repo "${{ github.repository }}" \
            --pr "${{ github.event.pull_request.number }}"
